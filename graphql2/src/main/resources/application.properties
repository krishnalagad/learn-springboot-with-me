spring.application.name=graphql2

# 1. Database Connection Settings
spring.datasource.url=jdbc:mysql://localhost:3306/graphql?useSSL=false&serverTimezone=UTC
spring.datasource.username=${MYSQL_USERNAME}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 3. Hibernate/JPA Settings
# 'update' will create tables if they don't exist and update them if they change.
spring.jpa.hibernate.ddl-auto=update
# Shows generated SQL in the console (useful for debugging)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

spring.graphql.graphiql.enabled=true